name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run ruff check --select=E,F,I

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run pytest
