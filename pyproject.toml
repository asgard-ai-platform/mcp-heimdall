[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
# TODO: Replace {service} with your service name (e.g., "mcp-ecpay")
name = "mcp-{service}"
version = "0.1.0"
description = "MCP Server for {Service Name} — AI-callable tools via Model Context Protocol"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Asgard AI Platform", email = "dev@asgard.ai"},
]

# Base dependencies (always required)
dependencies = [
    "requests>=2.31.0",
    "mcp>=1.0.0",
]

# ---------------------------------------------------------------------------
# Connector-specific dependencies — uncomment what you need:
# ---------------------------------------------------------------------------
# RSS connector:
#   "feedparser>=6.0.0",
#
# Scraper connector:
#   "beautifulsoup4>=4.12.0",
#
# MQTT connector:
#   "paho-mqtt>=2.0.0",
# ---------------------------------------------------------------------------

[project.scripts]
# TODO: Replace {service} with your service name
mcp-service = "mcp_server:main"

[tool.hatch.build.targets.wheel]
packages = ["config", "connectors", "auth", "tools"]

[tool.hatch.build.targets.wheel.force-include]
"app.py" = "app.py"
"mcp_server.py" = "mcp_server.py"
